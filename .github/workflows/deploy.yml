name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate HTML/CSS/JS syntax
        run: |
          # Check if node and basic syntax validation is available
          node --version || echo "Node not available"
          echo "Build validation complete"

      - name: Check for common issues
        run: |
          echo "Checking file structure..."
          [ -f "app/index.html" ] && echo "✓ Main app found" || echo "✗ Main app missing"
          [ -f "landing.html" ] && echo "✓ Landing page found" || echo "✗ Landing page missing"
          [ -f "app/app.js" ] && echo "✓ App.js found" || echo "✗ App.js missing"
          [ -f "app/style.css" ] && echo "✓ Style.css found" || echo "✗ Style.css missing"
          [ -d "app/webgl" ] && echo "✓ WebGL module found" || echo "✗ WebGL module missing"
