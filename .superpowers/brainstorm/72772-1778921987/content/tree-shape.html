<h2>树的形态 — 侧视图风格</h2>
<p class="subtitle">每天记录让树生长。哪种形态最符合你的感觉？</p>

<div class="cards">

  <div class="card" data-choice="A" onclick="toggleSelect(this)">
    <div class="card-image" style="
      background: #0A0C10;
      display: flex; align-items: flex-end; justify-content: center;
      height: 200px; gap: 18px; padding-bottom: 16px;
      position: relative; overflow: hidden;
    ">
      <div style="position:absolute; bottom:0; left:0; right:0; height:2px; background: linear-gradient(to right, transparent, rgba(74,124,89,0.3), transparent);"></div>
      <!-- 早期小树 -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:0;">
        <svg viewBox="0 0 40 60" fill="none" width="36">
          <ellipse cx="20" cy="28" rx="10" ry="12" fill="none" stroke="#3D5A47" stroke-width="1" opacity="0.5"/>
          <rect x="18" y="38" width="4" height="18" rx="1.5" fill="#4A3A28"/>
        </svg>
        <span style="font-size:9px;color:rgba(232,232,236,0.3);letter-spacing:.1em;">7天</span>
      </div>
      <!-- 中期树 -->
      <div style="display:flex;flex-direction:column;align-items:center;gap:0;">
        <svg viewBox="0 0 56 80" fill="none" width="48">
          <ellipse cx="28" cy="34" rx="16" ry="20" fill="none" stroke="#4A7C59" stroke-width="1.2" opacity="0.6"/>
          <ellipse cx="28" cy="28" rx="10" ry="12" fill="none" stroke="#6B9B7A" stroke-width="1" opacity="0.4"/>
          <rect x="25" y="52" width="6" height="24" rx="2" fill="#5A4630"/>

        <span style="font-size:9px;color:rgba(232,232,236,0.3);letter-spacing:.1em;">3个月</span>
      </div>

        <div style="position:absolute;top:10px;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(74,124,89,0.2) 0%,transparent 70%);"></div>
        <svg viewBox="0 0 80 110" fill="none" width="72">
          <defs>
            <radialGradient id="canopyGlow" cx="50%" cy="45%" r="50%">
              <stop offset="0%" stop-color="#6B9B7A" stop-opacity="0.8"/>
              <stop offset="60%" stop-color="#4A7C59" stop-opacity="0.5"/>
              <stop offset="100%" stop-color="#4A7C59" stop-opacity="0.1"/>
            </radialGradient>
          </defs>
          <!-- 树冠层叠 -->
          <ellipse cx="40" cy="44" rx="30" ry="34" fill="url(#canopyGlow)" opacity="0.3"/>
          <ellipse cx="40" cy="46" rx="24" ry="28" fill="none" stroke="#4A7C59" stroke-width="1" opacity="0.5"/>
          <ellipse cx="40" cy="38" rx="18" ry="22" fill="none" stroke="#6B9B7A" stroke-width="1.2" opacity="0.65"/>
          <ellipse cx="40" cy="30" rx="11" ry="14" fill="none" stroke="#6B9B7A" stroke-width="1.5" opacity="0.8"/>
          <!-- 树干 -->
          <path d="M34 70 Q36 78 38 86 L42 86 Q40 78 46 70" fill="#6B5A40" opacity="0.9"/>
          <rect x="36" y="84" width="8" height="24" rx="2.5" fill="#6B5A40"/>

          <ellipse cx="40" cy="92" rx="4" ry="1.5" fill="none" stroke="#4A3A28" stroke-width="0.5" opacity="0.4"/>
          <ellipse cx="40" cy="96" rx="4" ry="1.5" fill="none" stroke="#4A3A28" stroke-width="0.5" opacity="0.3"/>
        </svg>
        <span style="font-size:9px;color:rgba(107,155,122,0.6);letter-spacing:.1em;">1年</span>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 树冠轮廓生长</h3>
      <p>树冠由小变大，层层椭圆叠加形成冠幅。记录越多树越茂盛。树干微微可见年轮纹理。简洁又有树的意象。</p>
    </div>
  </div>
